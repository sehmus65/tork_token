<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tork Pro VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .page { display: none; padding: 20px; flex-direction: column; align-items: center; padding-bottom: 110px; height: 100%; box-sizing: border-box; overflow-y: auto; }
        .active-page { display: flex; }
        .card-vip { width: 100%; border-radius: 20px; padding: 20px; margin-bottom: 15px; text-align: center; box-sizing: border-box; border: 1px solid rgba(255,255,255,0.1); }
        .bronz { background: linear-gradient(135deg, #3d2b1f, #8c593b); }
        .gold { background: linear-gradient(135deg, #463b00, #d4af37); }
        .platinum { background: linear-gradient(135deg, #1a1a1a, #757575); }
        .btn-stars { background: #fff; color: #000; border: none; padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .nav-bar { display: flex; justify-content: space-around; background: #0a0a0a; border-top: 1px solid #222; padding: 15px 0; position: fixed; bottom: 0; width: 100%; }
        .nav-item { color: #555; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: #0088cc; font-weight: bold; }
        #balance-box { background: #111; padding: 15px; border-radius: 15px; width: 100%; text-align: center; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="home" class="page active-page">
        <div id="balance-box">
            <div style="color: #888;">TORK BAKİYE</div>
            <div style="font-size: 35px; font-weight: bold;">💎 <span id="balance">0.00</span></div>
        </div>
        <img id="gear" src="https://cdn-icons-png.flaticon.com/512/503/503921.png" style="width:150px; margin:30px;" onclick="mine()">
    </div>

    <div id="market" class="page">
        <h2>VIP MAĞAZA</h2>
        <div class="card-vip bronz">
            <div>BRONZ PAKET</div>
            <button class="btn-stars" onclick="buyVip('Bronz', 250)">250 ⭐️ SATIN AL</button>
        </div>
        <div class="card-vip gold">
            <div>GOLD PAKET</div>
            <button class="btn-stars" onclick="buyVip('Gold', 500)">500 ⭐️ SATIN AL</button>
        </div>
        <div class="card-vip platinum">
            <div>PLATINUM PAKET</div>
            <button class="btn-stars" onclick="buyVip('Platinum', 750)">750 ⭐️ SATIN AL</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showPage('home', this)">🏠 Maden</div>
        <div class="nav-item" onclick="showPage('market', this)">👑 VIP Market</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let score = parseFloat(localStorage.getItem('tork_balance')) || 0;
        document.getElementById('balance').innerText = score.toFixed(2);

        function showPage(pId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(pId).classList.add('active-page');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        function mine() {
            score += 0.1;
            document.getElementById('balance').innerText = score.toFixed(2);
            localStorage.setItem('tork_balance', score);
        }

        function buyVip(tier, price) {
            // Bot tarafına "Satın alma istiyor" verisini gönderir
            tg.sendData(JSON.stringify({
                action: "buy_stars",
                item: tier,
                amount: price
            }));
        }
    </script>
</body>
</html>
