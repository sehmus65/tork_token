<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tork Pro VIP Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .page { display: none; padding: 20px; flex-direction: column; align-items: center; padding-bottom: 110px; height: 100%; box-sizing: border-box; overflow-y: auto; }
        .active-page { display: flex; }
        
        /* VIP Kart Tasarımları */
        .card-vip { width: 100%; border-radius: 20px; padding: 20px; margin-bottom: 15px; text-align: center; box-sizing: border-box; position: relative; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        
        .bronz { background: linear-gradient(135deg, #3d2b1f 0%, #8c593b 100%); border-color: #cd7f32; }
        .gold { background: linear-gradient(135deg, #463b00 0%, #d4af37 100%); border-color: #ffd700; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
        .platinum { background: linear-gradient(135deg, #1a1a1a 0%, #757575 100%); border-color: #e5e4e2; box-shadow: 0 0 20px rgba(255, 255, 255, 0.2); }

        .vip-title { font-size: 22px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
        .vip-desc { font-size: 13px; opacity: 0.9; margin-bottom: 15px; line-height: 1.4; }
        
        .btn-stars { background: #fff; color: #000; border: none; padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn-stars:active { transform: scale(0.96); }

        /* Navigasyon ve Diğerleri */
        .nav-bar { display: flex; justify-content: space-around; background: #0a0a0a; border-top: 1px solid #222; padding: 15px 0; position: fixed; bottom: 0; width: 100%; z-index: 100; }
        .nav-item { color: #555; font-size: 12px; text-align: center; cursor: pointer; }
        .nav-item.active { color: #0088cc; font-weight: bold; }
        
        #balance-box { background: #111; padding: 15px; border-radius: 15px; width: 100%; text-align: center; margin-bottom: 15px; border: 1px solid #222; }
        #gear { width: 160px; margin: 20px; transition: transform 0.05s; filter: drop-shadow(0 0 10px rgba(255,255,255,0.1)); }
        .particle { position: absolute; color: #fff; font-weight: bold; pointer-events: none; animation: flyUp 0.8s forwards; font-size: 22px; }
        @keyframes flyUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <div id="home" class="page active-page">
        <div id="balance-box">
            <div style="color: #888; font-size: 11px; letter-spacing: 1px;">TORK BAKİYE</div>
            <div style="font-size: 38px; font-weight: bold;">💎 <span id="balance">0.00</span></div>
        </div>
        <img id="gear" src="https://cdn-icons-png.flaticon.com/512/503/503921.png" onclick="mine(event)">
        <div style="width: 100%; margin-top: auto;">
            <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px;">
                <span>⚡ Enerji</span>
                <span><span id="energy-text">500</span>/500</span>
            </div>
            <div style="background: #222; height: 8px; border-radius: 4px; overflow: hidden; border: 1px solid #333;">
                <div id="energy-fill" style="background: #fff; height: 100%; width: 100%;"></div>
            </div>
        </div>
    </div>

    <div id="market" class="page">
        <h2 style="margin-bottom: 10px; letter-spacing: 1px;">VIP MAĞAZA</h2>
        <p style="color: #888; font-size: 12px; margin-bottom: 20px;">Yıldızlarla gücünü katla!</p>
        
        <div class="card-vip bronz">
            <div class="vip-title">BRONZ</div>
            <div class="vip-desc">Tık başına <b>+0.5</b> Bonus<br>Max Enerji: <b>1000</b></div>
            <button class="btn-stars" onclick="buyVip('BRONZ', 250)">250 ⭐️ SATIN AL</button>
        </div>

        <div class="card-vip gold">
            <div class="vip-title">GOLD</div>
            <div class="vip-desc">Tık başına <b>+2.0</b> Bonus<br>Max Enerji: <b>2500</b></div>
            <button class="btn-stars" onclick="buyVip('GOLD', 500)">500 ⭐️ SATIN AL</button>
        </div>

        <div class="card-vip platinum">
            <div class="vip-title">PLATINUM</div>
            <div class="vip-desc">Tık başına <b>+5.0</b> Bonus<br>Enerji Yenileme <b>X2</b></div>
            <button class="btn-stars" onclick="buyVip('PLATINUM', 750)">750 ⭐️ SATIN AL</button>
        </div>
    </div>

    <div id="tasks" class="page">
        <h2 style="margin-bottom: 20px;">SOSYAL GÖREVLER</h2>
        <div id="balance-box" style="margin-bottom: 20px;">
            <div style="font-weight: bold;">Instagram</div>
            <a href="https://www.instagram.com/sehmus.n0?igsh=MXhmOXNmM25kbDI1ZA==" target="_blank" style="text-decoration:none;">
                <button style="background:#fff; color:#000; border:none; padding:10px; width:100%; border-radius:10px; font-weight:bold; margin-top:10px;">TAKİP ET (+100 💎)</button>
            </a>
        </div>
        <div id="balance-box">
            <div style="font-weight: bold;">YouTube</div>
            <a href="https://www.youtube.com/@Torktoken" target="_blank" style="text-decoration:none;">
                <button style="background:#fff; color:#000; border:none; padding:10px; width:100%; border-radius:10px; font-weight:bold; margin-top:10px;">ABONE OL (+150 💎)</button>
            </a>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showPage('home', this)">🏠 Maden</div>
        <div class="nav-item" onclick="showPage('market', this)">👑 VIP Market</div>
        <div class="nav-item" onclick="showPage('tasks', this)">📋 Görevler</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        let score = parseFloat(localStorage.getItem('tork_balance')) || 0;
        let energy = 500;
        document.getElementById('balance').innerText = score.toFixed(2);

        function showPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(pageId).classList.add('active-page');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function mine(e) {
            if (energy > 0) {
                score += 0.10;
                energy -= 1;
                document.getElementById('balance').innerText = score.toFixed(2);
                document.getElementById('energy-text').innerText = energy;
                document.getElementById('energy-fill').style.width = (energy/500)*100 + "%";
                createParticle(e.clientX, e.clientY);
                document.getElementById('gear').style.transform += 'rotate(15deg)';
                tg.HapticFeedback.impactOccurred('medium');
            }
        }

        function createParticle(x, y) {
            const p = document.createElement('div');
            p.className = 'particle'; p.style.left = x + 'px'; p.style.top = y + 'px';
            p.innerText = '+0.1'; document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
        }

        function buyVip(tier, price) {
            tg.showPopup({
                title: tier + ' Paketi',
                message: price + ' ⭐️ karşılığında ' + tier + ' seviyesine yükseltmek istiyor musunuz?',
                buttons: [
                    {id: 'buy', type: 'default', text: 'Yıldızla Öde'},
                    {type: 'cancel', text: 'Vazgeç'}
                ]
            });
        }
    </script>
</body>
</html>
