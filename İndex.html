<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tork Token App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; user-select: none; }
        #balance { font-size: 36px; font-weight: bold; margin-bottom: 20px; }
        #tork-gear { width: 280px; height: 280px; cursor: pointer; transition: transform 0.1s; filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.2)); }
        #tork-gear:active { transform: scale(0.92); }
        .energy-box { width: 80%; height: 12px; background: #111; border-radius: 10px; margin-top: 30px; border: 1px solid #333; }
        #energy-bar { width: 100%; height: 100%; background: #fff; border-radius: 10px; transition: width 0.3s; }
    </style>
</head>
<body>
    <div id="balance">💎 <span id="pts">0.00</span> TRK</div>
    <img id="tork-gear" src="https://cdn-icons-png.flaticon.com/512/503/503921.png" onclick="mine()">
    <div class="energy-box"><div id="energy-bar"></div></div>
    <p>⚡ Enerji: %<span id="energy-text">100</span></p>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let pts = 0; let energy = 100;
        function mine() {
            if (energy > 0) {
                pts = (parseFloat(pts) + 0.01).toFixed(2);
                energy -= 1;
                document.getElementById('pts').innerText = pts;
                document.getElementById('energy-bar').style.width = energy + "%";
                document.getElementById('energy-text').innerText = energy;
                document.getElementById('tork-gear').style.transform = `rotate(${pts * 500}deg)`;
                tg.HapticFeedback.impactOccurred('medium');
            }
        }
    </script>
</body>
</html>
